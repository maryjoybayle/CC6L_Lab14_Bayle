name: FleetFlow CI/CD Pipeline

# Trigger this workflow whenever code is pushed to the main branch
on:
  push:
    branches: [ "main" ]

jobs:
  # JOB 1: Continuous Integration (Testing)
  test-api:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    - name: Setup Python Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Quality Gate (Pytest)
      run: pytest

  # JOB 2: Continuous Deployment (OpenShift)
  deploy-openshift:
    needs: test-api # Will not run unless test-api succeeds!
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    - name: Authenticate and Trigger OpenShift Build
      # Securely inject our secrets into the runner
      env:
        SERVER: ${{ secrets.OPENSHIFT_SERVER }}
        TOKEN: ${{ secrets.OPENSHIFT_TOKEN }}
      run: |
        # Download the OpenShift CLI tool
        curl -L https://mirror.openshift.com/pub/openshift-v4/clients/ocp/latest/openshift-client-linux.tar.gz | tar xvz
        sudo mv oc /usr/local/bin/

        # Login using the hidden secrets
        oc login --token=$TOKEN --server=$SERVER --insecure-skip-tls-verify

        # Create a new app using S2I (if it doesn't exist) or start a build
        oc new-app python:3.11~. --name=fleetflow-cicd || oc start-build fleetflow-cicd --from-dir=. --follow
